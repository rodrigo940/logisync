<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação | LogiSync</title>
    <link rel="stylesheet" href="./estilo/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="#3b82f6" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="#3b82f6"/></svg>
                <h2>LogiSync</h2>
            </div>
            <nav><ul>
                <li><a href="painel.html">Painel de Controle</a></li>
                <li><a href="consulta.html">Consultar Estoque</a></li>
                <li><a href="retirada.html" class="ativo">Movimentação</a></li>
                <li><a href="cadastro.html">Cadastro de Produtos</a></li>
                <li><a href="relatorios.html">Relatórios</a></li>
            </ul></nav>
        </aside>

        <main class="conteudo-principal">
            <header>
                <div><h1>Registro de Movimentação Técnica</h1><p id="clock" style="color: #3b82f6; font-weight: bold;"></p></div>
            </header>

            <section class="cartao">
                <form class="form-grid-3col">
                    <div class="grupo-input span-full"><label>Responsável / Matrícula</label><input type="text" required></div>
                    <div class="grupo-input"><label>Código do Item</label><input type="text" required></div>
                    <div class="grupo-input"><label>Quantidade</label><input type="number" value="1"></div>
                    <div class="grupo-input"><label>Ordem de Serviço (OS)</label><input type="text"></div>
                    <div class="grupo-input"><label>Nota Fiscal (NF)</label><input type="text"></div>
                    <div class="grupo-input span-full"><label>Observações Detalhadas</label><textarea rows="3"></textarea></div>
                    <div class="span-full" style="display: flex; gap: 15px;">
                        <button type="button" class="btn btn-red" style="flex: 1;">Registrar Saída</button>
                        <button type="button" class="btn btn-green" style="flex: 1;">Registrar Entrada</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script>
        function update() { document.getElementById('clock').innerText = "Horário do Registro: " + new Date().toLocaleString('pt-BR'); }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
