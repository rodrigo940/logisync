<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação | LogiSync</title>
    <link rel="stylesheet" href="./estilo/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="#3b82f6" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="#3b82f6"/>
                </svg>
                <h2>LogiSync</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="painel.html">Painel de Controle</a></li>
                    <li><a href="consulta.html">Consultar Estoque</a></li>
                    <li><a href="retirada.html" class="ativo">Movimentação</a></li>
                    <li><a href="cadastro.html">Cadastro de Produtos</a></li>
                    <li><a href="relatorios.html">Relatórios</a></li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <header>
                <h1>Registro de Movimentação Técnica</h1>
                <p id="relogio-auto" style="color: #3b82f6; font-weight: bold;"></p>
            </header>

            <section class="cartao" style="max-width: 800px;">
                <form style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="grupo-input" style="grid-column: span 2;">
                        <label>Responsável / Matrícula</label>
                        <input type="text" placeholder="Ex: João Souza (1234)" required>
                    </div>
                    <div class="grupo-input">
                        <label>Código do Item</label>
                        <input type="text" placeholder="Bipe o código aqui" required>
                    </div>
                    <div class="grupo-input">
                        <label>Quantidade</label>
                        <input type="number" value="1">
                    </div>
                    <div class="grupo-input">
                        <label>Ordem de Serviço (OS)</label>
                        <input type="text" placeholder="OS-2026-X">
                    </div>
                    <div class="grupo-input">
                        <label>Nota Fiscal (NF)</label>
                        <input type="text" placeholder="Entrada por NF">
                    </div>
                    <div class="grupo-input" style="grid-column: span 2;">
                        <label>Observações do Estado do Material</label>
                        <textarea rows="3" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 5px; padding: 10px;"></textarea>
                    </div>
                    <div style="grid-column: span 2; display: flex; gap: 10px;">
                        <button type="button" class="btn" style="flex: 1; background: #ef4444; color: white;">REGISTRAR SAÍDA</button>
                        <button type="button" class="btn" style="flex: 1; background: #10b981; color: white;">REGISTRAR ENTRADA</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('relogio-auto').innerText = "Data/Hora Atual: " + now.toLocaleString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
