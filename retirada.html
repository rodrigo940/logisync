<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação | LogiSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <aside class="sidebar">
            <h2>LogiSync</h2>
            <nav>
                <ul>
                    <li><a href="index.html">Painel de Controle</a></li>
                    <li><a href="consulta.html">Consultar Estoque</a></li>
                    <li><a href="retirada.html" class="ativo">Movimentação (Entrada/Saída)</a></li>
                    <li><a href="cadastro.html">Cadastro de Produtos</a></li>
                    <li><a href="relatorios.html">Relatórios</a></li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <header>
                <h1>Registro de Movimentação</h1>
                <div class="perfil-usuario">Logado: Administrador</div>
            </header>

            <section class="area-formulario">
                <div class="cartao form-container" style="max-width: 800px;">
                    <h3 style="margin-bottom: 20px;">Registrar Entrada ou Saída</h3>
                    
                    <form action="#">
                        <div class="grid-duas-colunas" style="margin-bottom: 15px;">
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="matricula">Matrícula ou Nome do Responsável</label>
                                <input type="text" id="matricula" placeholder="Ex: João Silva ou 12345" required>
                            </div>
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="codigo-item">Código do Produto / Ferramenta</label>
                                <input type="text" id="codigo-item" placeholder="Digite ou bipe o código" required>
                            </div>
                        </div>

                        <div class="grid-duas-colunas" style="margin-bottom: 15px;">
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="quantidade">Quantidade</label>
                                <input type="number" id="quantidade" value="1" min="1" required>
                            </div>
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="data-hora">Data e Hora (Automático)</label>
                                <input type="datetime-local" id="data-hora" readonly style="background-color: #e2e8f0; color: #475569; cursor: not-allowed;" required>
                            </div>
                        </div>

                        <div class="grid-duas-colunas" style="margin-bottom: 15px;">
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="ordem-servico">Ordem de Serviço (OS)</label>
                                <input type="text" id="ordem-servico" placeholder="Ex: OS-2026-001">
                            </div>
                            <div class="grupo-input" style="width: 100%; margin-bottom: 0;">
                                <label for="nota-fiscal">Número da Nota Fiscal (NF)</label>
                                <input type="text" id="nota-fiscal" placeholder="Ex: 558902 (Para Entradas)">
                            </div>
                        </div>

                        <div class="grupo-input">
                            <label for="observacoes">Observações (Opcional)</label>
                            <input type="text" id="observacoes" placeholder="Ex: Ferramenta entregue com pequeno arranhão...">
                        </div>

                        <div class="botoes-acao" style="margin-top: 25px;">
                            <button type="button" class="btn btn-saida">REGISTRAR SAÍDA (Para OS)</button>
                            <button type="button" class="btn btn-devolucao">REGISTRAR ENTRADA (Por NF ou Devolução)</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>

    </div>

    <script>
        window.onload = function() {
            const agora = new Date();
            
            const ano = agora.getFullYear();
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const dia = String(agora.getDate()).padStart(2, '0');
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            
            // O HTML exige que a data seja escrita no formato "Ano-Mês-DiaTHora:Minuto"
            const dataLocalFormatada = `${ano}-${mes}-${dia}T${horas}:${minutos}`;
            
            // Insere o valor dentro do campo automaticamente
            document.getElementById('data-hora').value = dataLocalFormatada;
        }
    </script>
</body>
</html>
