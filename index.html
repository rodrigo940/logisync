<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LogiSync</title>
    <link rel="stylesheet" href="./estilo/style.css">
</head>
<body class="tela-login">
    
    <div class="login-container">
        <div class="login-cabecalho">
            <h2>LogiSync</h2>
            <p>Gestão Integrada para o seu Negócio</p>
        </div>

        <form id="form-login">
            <div class="grupo-input">
                <label for="usuario">Usuário ou Matrícula</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário" required>
            </div>

            <div class="grupo-input">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <p id="mensagem-erro" style="color: #ef4444; font-size: 14px; margin-bottom: 15px; display: none; text-align: center; font-weight: bold;">
                Usuário ou senha incorretos!
            </p>

            <button type="submit" class="btn btn-importar" style="width: 100%;">ENTRAR NO SISTEMA</button>
        </form>

        <div class="login-rodape">
            <p>Esqueceu a senha? Fale com o suporte de TI.</p>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(evento) {
            evento.preventDefault(); 
            const usuarioDigitado = document.getElementById('usuario').value;
            const senhaDigitada = document.getElementById('senha').value;
            const mensagemErro = document.getElementById('mensagem-erro');

            // Agora ele redireciona para painel.html
            if (usuarioDigitado === 'admin' && senhaDigitada === '123') {
                mensagemErro.style.display = 'none';
                window.location.href = 'painel.html';
            } else {
                mensagemErro.style.display = 'block';
            }
        });
    </script>
</body>
</html>
