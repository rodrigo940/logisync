<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | LogiSync</title>
    <link rel="stylesheet" href="./estilo/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="#3b82f6" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="#3b82f6"/> </svg>
                <h2>LogiSync</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="painel.html">Painel de Controle</a></li>
                    <li><a href="consulta.html">Consultar Estoque</a></li>
                    <li><a href="retirada.html">Movimentação</a></li>
                    <li><a href="cadastro.html" class="ativo">Cadastro de Produtos</a></li>
                    <li><a href="relatorios.html">Relatórios</a></li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <header><h1>Gestão e Importação de Ativos</h1></header>

            <div class="grid-manual-excel">
                <section class="cartao">
                    <h2 style="margin-bottom: 20px;">Cadastro de Novo Item</h2>
                    <form class="form-grid-3col">
                        <div class="grupo-input span-full">
                            <label>Descrição Detalhada</label>
                            <input type="text" placeholder="Ex: Martelete Bosch 220V GBH 2-24 D" required>
                        </div>
                        <div class="grupo-input"><label>SKU / Patrimônio</label><input type="text" required></div>
                        <div class="grupo-input">
                            <label>Categoria</label>
                            <select><option>EPIs</option><option>Ferramentas</option><option>Consumíveis</option></select>
                        </div>
                        <div class="grupo-input">
                            <label>Unidade</label>
                            <select><option>un</option><option>pr</option><option>cx</option><option>m</option></select>
                        </div>
                        <div class="grupo-input"><label>Estoque Mínimo</label><input type="number" value="10"></div>
                        <div class="grupo-input span-full"><label>Localização Exata</label><input type="text" placeholder="Corredor - Prateleira - Gaveta"></div>
                        <button type="submit" class="btn btn-blue span-full">SALVAR NO BANCO DE DADOS</button>
                    </form>
                </section>

                <section class="cartao" style="border: 2px dashed #10b981; background: #f0fdf4; text-align: center;">
                    <div style="background: #10b981; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    </div>
                    <h2 style="color: #065f46; font-size: 20px;">Importação em Massa</h2>
                    <p style="margin: 10px 0;">Arraste sua planilha .xlsx ou .csv aqui</p>
                    <input type="file" id="excel" style="display: none;">
                    <label for="excel" class="btn btn-green" style="display: inline-block; cursor: pointer;">SELECIONAR EXCEL</label>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
