<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos | LogiSync</title>
    <link rel="stylesheet" href="./estilo/style.css">
</head>
<body>
    <div class="container">
        
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #334155; padding-bottom: 15px;">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" fill="#3b82f6"/>
                </svg>
                <h2 style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">LogiSync</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="painel.html">Painel de Controle</a></li>
                    <li><a href="consulta.html">Consultar Estoque</a></li>
                    <li><a href="retirada.html">Movimentação (Entrada/Saída)</a></li>
                    <li><a href="cadastro.html" class="ativo">Cadastro de Produtos</a></li>
                    <li><a href="relatorios.html">Relatórios</a></li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <header>
                <div>
                    <h1>Cadastro de Novos Produtos</h1>
                    <p style="color: #64748b; font-weight: bold; font-size: 14px;">Logado: Administrador</p>
                </div>
            </header>

            <section class="cartao" style="max-width: 800px;">
                <form id="form-cadastro">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="grupo-input">
                            <label>Nome do Produto</label>
                            <input type="text" placeholder="Ex: Luva de Vaqueta" required>
                        </div>
                        <div class="grupo-input">
                            <label>Código Interno / SKU</label>
                            <input type="text" placeholder="Ex: PROD-102">
                        </div>
                        <div class="grupo-input">
                            <label>Categoria</label>
                            <select style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #cbd5e1;">
                                <option>EPIs</option>
                                <option>Ferramentas Elétricas</option>
                                <option>Consumíveis</option>
                                <option>Ferragens</option>
                            </select>
                        </div>
                        <div class="grupo-input">
                            <label>Estoque Mínimo (Alerta)</label>
                            <input type="number" value="10">
                        </div>
                        <div class="grupo-input">
                            <label>Localização (Corredor/Gaveta)</label>
                            <input type="text" placeholder="Ex: C1-P2-G5">
                        </div>
                        <div class="grupo-input">
                            <label>Unidade de Medida</label>
                            <select style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #cbd5e1;">
                                <option>Unidade (un)</option>
                                <option>Par (pr)</option>
                                <option>Caixa (cx)</option>
                                <option>Metro (m)</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-importar" style="margin-top: 20px; width: 100%;">CADASTRAR PRODUTO NO SISTEMA</button>
                </form>
            </section>
        </main>

    </div>
</body>
</html>
